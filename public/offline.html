<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Ayush Tiwari</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .75rem; }
    p  { color: #a1a1aa; line-height: 1.6; margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      padding: .25rem .75rem;
      border-radius: 9999px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      color: #818cf8;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    button {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1.5rem;
      border-radius: .75rem;
      background: #6366f1;
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #4f46e5; }
    .name { margin-top: 2.5rem; color: #52525b; font-size: .8rem; }
    .name span { color: #6366f1; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <div class="badge">No Connection</div>
    <h1>You're Offline</h1>
    <p>Looks like you've lost your internet connection.<br/>Some cached pages are still available — try going back, or retry when you're online.</p>
    <button onclick="location.reload()">↺ Try Again</button>
    <p class="name">Ayush Tiwari — <span>Portfolio</span></p>
  </div>
</body>
</html>
